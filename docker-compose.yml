services:
  postgres:
    image: postgres:16-alpine
    container_name: adpropia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: adpropia
    ports:
      - "5433:5432"
    volumes:
      - adpropia-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d adpropia"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  adpropia-postgres-data:
